<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guray's Hypertrophy Max Tracker</title>
<meta name="description" content="12 haftalık progressive overload antrenman takip uygulaması. İtiş, çekiş ve bacak hareketlerini haftalık olarak izle.">
<meta property="og:title" content="Guray's Hypertrophy Max Tracker">
<meta property="og:description" content="12 haftalık progressive overload antrenman takip uygulaması.">
<meta property="og:type" content="website">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080c14;
    --surface: #0f1623;
    --surface2:#141d2e;
    --border:  #1e2d45;
    --text:    #e8f0ff;
    --muted:   #4a6080;
    --success: #00ff9d;
    --push:    #ff6b35;
    --pull:    #00d4ff;
    --legs:    #a855f7;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .container { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:24px; }

  /* ── HEADER ── */
  header {
    display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px;
    margin-bottom:36px; padding-bottom:24px; border-bottom:1px solid var(--border);
  }
  .logo h1 {
    font-family:'Bebas Neue',sans-serif;
    font-size: clamp(2rem, 5vw, 4rem);
    letter-spacing:3px; line-height:1;
    background: linear-gradient(135deg, var(--pull), #7b61ff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .logo p { font-size:.75rem; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-top:4px; }

  .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .badge {
    font-family:'JetBrains Mono',monospace; font-size:.65rem;
    padding:4px 12px; border-radius:2px; letter-spacing:2px; text-transform:uppercase;
  }
  .badge-push { color:var(--push); border:1px solid var(--push); }
  .badge-pull { color:var(--pull); border:1px solid var(--pull); }
  .badge-legs { color:var(--legs); border:1px solid var(--legs); }

  #fileInput { display:none; }
  .import-btn {
    font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:2px;
    text-transform:uppercase; padding:8px 16px; border-radius:2px; cursor:pointer;
    border:1px solid var(--success); color:var(--success); background:rgba(0,255,157,.06);
    transition:background .15s;
  }
  .import-btn:hover { background:rgba(0,255,157,.14); }
  .analysis-btn {
    font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:2px;
    text-transform:uppercase; padding:8px 16px; border-radius:2px; cursor:pointer;
    border:1px solid #7b61ff; color:#7b61ff; background:rgba(123,97,255,.06);
    transition:background .15s;
  }
  .analysis-btn:hover { background:rgba(123,97,255,.16); }
  .analysis-btn:disabled { opacity:.4; cursor:not-allowed; }

  /* ── ANALİZ MODAL ── */
  .analysis-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.82); z-index:150;
    display:flex; align-items:flex-start; justify-content:center;
    backdrop-filter:blur(6px); opacity:0; pointer-events:none; transition:opacity .25s;
    padding:24px 16px; overflow-y:auto;
  }
  .analysis-overlay.open { opacity:1; pointer-events:all; }
  .analysis-panel {
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    width:100%; max-width:780px; padding:36px; position:relative; margin:auto;
    transform:translateY(20px); transition:transform .25s;
  }
  .analysis-overlay.open .analysis-panel { transform:translateY(0); }
  .analysis-close {
    position:absolute; top:16px; right:20px;
    background:none; border:none; color:var(--muted); font-size:1.4rem;
    cursor:pointer; padding:4px 8px; border-radius:3px; transition:color .15s;
  }
  .analysis-close:hover { color:var(--text); }
  .analysis-header { margin-bottom:28px; }
  .analysis-header h2 { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:3px; background:linear-gradient(135deg,#7b61ff,var(--pull)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .analysis-header p { font-family:'JetBrains Mono',monospace; font-size:.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:4px; }
  .analysis-loading { display:flex; flex-direction:column; align-items:center; gap:16px; padding:60px 0; }
  .spinner { width:36px; height:36px; border:2px solid var(--border); border-top-color:#7b61ff; border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-family:'JetBrains Mono',monospace; font-size:.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
  .analysis-body { display:flex; flex-direction:column; gap:24px; }
  .asec { border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .asec-title { padding:12px 18px; background:var(--surface2); font-family:'Bebas Neue',sans-serif; font-size:.95rem; letter-spacing:2px; display:flex; align-items:center; gap:10px; }
  .asec-body { padding:18px; }
  .strength-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .sc { background:var(--bg); border-radius:4px; padding:14px; border:1px solid var(--border); }
  .sc-lbl { font-family:'JetBrains Mono',monospace; font-size:.55rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .sc-name { font-size:.85rem; font-weight:600; margin-bottom:8px; line-height:1.3; }
  .sc-bar-bg { background:var(--border); border-radius:2px; height:4px; margin-bottom:6px; }
  .sc-bar { height:4px; border-radius:2px; }
  .sc-val { font-family:'JetBrains Mono',monospace; font-size:.65rem; color:var(--muted); }
  .prog-list { display:flex; flex-direction:column; gap:10px; }
  .prog-item { display:flex; align-items:center; gap:12px; }
  .prog-name { font-size:.82rem; flex:1; min-width:0; }
  .prog-bar-bg { flex:2; background:var(--border); border-radius:2px; height:6px; }
  .prog-bar { height:6px; border-radius:2px; }
  .prog-pct { font-family:'JetBrains Mono',monospace; font-size:.65rem; color:var(--muted); min-width:44px; text-align:right; }
  .rec-list { display:flex; flex-direction:column; gap:12px; }
  .rec-item { display:flex; gap:14px; align-items:flex-start; background:var(--bg); border-radius:4px; padding:14px; border:1px solid var(--border); }
  .rec-icon { font-size:1.3rem; flex-shrink:0; }
  .rec-title { font-weight:600; font-size:.85rem; margin-bottom:4px; }
  .rec-desc { font-size:.78rem; color:var(--muted); line-height:1.65; }
  .rec-tag { display:inline-block; font-family:'JetBrains Mono',monospace; font-size:.55rem; letter-spacing:1px; text-transform:uppercase; padding:2px 7px; border-radius:2px; margin-top:6px; }
  .summary-box { background:rgba(123,97,255,.07); border:1px solid rgba(123,97,255,.25); border-radius:6px; padding:18px 20px; font-size:.85rem; line-height:1.85; color:var(--text); }
  .summary-box strong { color:#a78bfa; }
  @media (max-width:600px) { .strength-grid { grid-template-columns:1fr 1fr; } .analysis-panel { padding:22px 16px; } }

  /* ── LAYOUT ── */
  .layout { display:grid; grid-template-columns:280px 1fr; gap:20px; align-items:start; }

  /* ── SIDEBAR ── */
  .sidebar {
    background:var(--surface); border:1px solid var(--border); border-radius:4px;
    overflow:hidden; position:sticky; top:20px;
    max-height:calc(100vh - 44px); overflow-y:auto;
  }
  .sidebar::-webkit-scrollbar { width:4px; }
  .sidebar::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .sidebar-hdr {
    padding:14px 18px; background:var(--surface2); border-bottom:1px solid var(--border);
    font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:3px;
    text-transform:uppercase; color:var(--muted); position:sticky; top:0; z-index:1;
  }
  .grp { border-bottom:1px solid var(--border); }
  .grp:last-child { border-bottom:none; }
  .grp-lbl {
    padding:10px 18px; font-family:'Bebas Neue',sans-serif;
    font-size:.85rem; letter-spacing:3px; display:flex; align-items:center; gap:8px;
  }
  .grp-lbl.push { color:var(--push); background:rgba(255,107,53,.06); }
  .grp-lbl.pull { color:var(--pull); background:rgba(0,212,255,.06); }
  .grp-lbl.legs { color:var(--legs); background:rgba(168,85,247,.06); }
  .grp-lbl::before { content:''; width:4px; height:4px; border-radius:50%; flex-shrink:0; }
  .grp-lbl.push::before { background:var(--push); }
  .grp-lbl.pull::before { background:var(--pull); }
  .grp-lbl.legs::before { background:var(--legs); }

  .ex-btn {
    display:flex; align-items:center; gap:6px; width:100%;
    padding:9px 14px 9px 28px; background:transparent; border:none;
    color:var(--muted); font-family:'DM Sans',sans-serif; font-size:.8rem;
    text-align:left; cursor:pointer; transition:all .15s;
    border-left:2px solid transparent;
  }
  .ex-name { flex:1; line-height:1.3; }
  .day-tag {
    font-family:'JetBrains Mono',monospace; font-size:.5rem; letter-spacing:1px;
    padding:2px 5px; border-radius:2px; opacity:.5; flex-shrink:0; border:1px solid currentColor;
  }
  .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .dot-on  { background:var(--success); box-shadow:0 0 6px var(--success); }
  .dot-off { border:1px solid var(--muted); opacity:.3; }

  .ex-btn:hover { background:rgba(255,255,255,.03); color:var(--text); border-left-color:var(--muted); }
  .ex-btn.active.push { background:rgba(255,107,53,.08); color:var(--push); border-left-color:var(--push); font-weight:600; }
  .ex-btn.active.pull { background:rgba(0,212,255,.08);  color:var(--pull); border-left-color:var(--pull); font-weight:600; }
  .ex-btn.active.legs { background:rgba(168,85,247,.08); color:var(--legs); border-left-color:var(--legs); font-weight:600; }

  /* ── CONTENT ── */
  .content { display:flex; flex-direction:column; gap:20px; }

  /* ── STAT CARDS ── */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .stat {
    background:var(--surface); border:1px solid var(--border); border-radius:4px;
    padding:16px 20px; position:relative; overflow:hidden;
  }
  .stat::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .stat.accent-push::before  { background:linear-gradient(90deg,var(--push),transparent); }
  .stat.accent-pull::before  { background:linear-gradient(90deg,var(--pull),transparent); }
  .stat.accent-legs::before  { background:linear-gradient(90deg,var(--legs),transparent); }
  .stat.accent-green::before { background:linear-gradient(90deg,var(--success),transparent); }
  .stat-lbl {
    font-family:'JetBrains Mono',monospace; font-size:.6rem; letter-spacing:2px;
    text-transform:uppercase; color:var(--muted); margin-bottom:8px;
  }
  .stat-val { font-family:'Bebas Neue',sans-serif; font-size:2rem; line-height:1; letter-spacing:2px; }
  .stat-val.push  { color:var(--push); }
  .stat-val.pull  { color:var(--pull); }
  .stat-val.legs  { color:var(--legs); }
  .stat-val.green { color:var(--success); }
  .stat-val span  { font-size:.9rem; color:var(--muted); }
  .stat-sub { font-size:.7rem; color:var(--muted); margin-top:4px; }

  /* ── CHART CARD ── */
  .chart-card {
    background:var(--surface); border:1px solid var(--border); border-radius:4px;
    padding:28px; position:relative; overflow:hidden;
  }
  .chart-card::after {
    content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
    background:radial-gradient(circle at 50% 0%,rgba(0,212,255,.03),transparent 60%);
    pointer-events:none;
  }
  .chart-title-row { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
  .chart-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:2px; line-height:1; }
  .chart-sub { font-family:'JetBrains Mono',monospace; font-size:.6rem; letter-spacing:2px; text-transform:uppercase; margin-top:6px; }
  .chart-wrap { position:relative; height:340px; }

  .empty-state { height:340px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); }
  .empty-text { font-family:'JetBrains Mono',monospace; font-size:.75rem; letter-spacing:2px; text-transform:uppercase; text-align:center; line-height:1.8; }

  /* ── WEEKLY TABLE ── */
  .tbl-card { background:var(--surface); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .tbl-hdr {
    padding:14px 20px; background:var(--surface2); border-bottom:1px solid var(--border);
    font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:3px;
    text-transform:uppercase; color:var(--muted);
  }
  .day-band {
    padding:8px 20px; font-family:'JetBrains Mono',monospace; font-size:.6rem;
    letter-spacing:2px; text-transform:uppercase;
    border-bottom:1px solid var(--border); border-top:1px solid var(--border);
  }
  .wk-grid { display:grid; grid-template-columns:repeat(12,1fr); }
  .wk-cell {
    padding:12px 8px; text-align:center; border-right:1px solid var(--border);
    cursor:pointer; transition:background .15s; position:relative;
  }
  .wk-cell:last-child { border-right:none; }
  .wk-cell:hover { background:rgba(255,255,255,.04); }
  .wk-cell:hover .wk-edit { opacity:1; }
  .wk-num { font-family:'JetBrains Mono',monospace; font-size:.55rem; color:var(--muted); letter-spacing:1px; margin-bottom:6px; }
  .wk-val { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:1px; }
  .wk-val.push  { color:var(--push); }
  .wk-val.pull  { color:var(--pull); }
  .wk-val.legs  { color:var(--legs); }
  .wk-val.empty { color:var(--border); }
  .wk-delta { font-family:'JetBrains Mono',monospace; font-size:.55rem; margin-top:3px; min-height:.9em; }
  .du { color:var(--success); } .dd { color:#ff4757; } .ds { color:var(--muted); }
  .wk-edit { position:absolute; bottom:4px; right:5px; font-size:.5rem; color:var(--muted); opacity:0; transition:opacity .15s; pointer-events:none; }

  /* ── WEIGHT INPUT MODAL ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background:var(--surface2); border:1px solid var(--border); border-radius:6px;
    padding:28px 32px; min-width:300px;
    transform:translateY(12px); transition:transform .2s;
  }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-title { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:2px; margin-bottom:4px; }
  .modal-sub { font-family:'JetBrains Mono',monospace; font-size:.6rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:20px; }
  .modal input {
    width:100%; background:var(--bg); border:1px solid var(--border); border-radius:3px;
    color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:2px;
    padding:12px 16px; outline:none; transition:border-color .15s; text-align:center;
  }
  .modal input:focus { border-color:var(--muted); }
  .modal-actions { display:flex; gap:10px; margin-top:16px; }
  .btn-confirm {
    flex:1; padding:10px; border:none; border-radius:3px; cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-size:.7rem; letter-spacing:2px; text-transform:uppercase;
    background:var(--success); color:#000; font-weight:600; transition:opacity .15s;
  }
  .btn-confirm:hover { opacity:.85; }
  .btn-cancel {
    padding:10px 18px; border:1px solid var(--border); border-radius:3px; cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-size:.7rem; letter-spacing:2px; text-transform:uppercase;
    background:transparent; color:var(--muted); transition:border-color .15s;
  }
  .btn-cancel:hover { border-color:var(--muted); color:var(--text); }
  .btn-clear {
    padding:10px 14px; border:1px solid #ff4757; border-radius:3px; cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-size:.7rem; letter-spacing:2px; text-transform:uppercase;
    background:transparent; color:#ff4757; transition:background .15s;
  }
  .btn-clear:hover { background:rgba(255,71,87,.1); }

  /* ── PLACEHOLDER ── */
  .placeholder {
    background:var(--surface); border:1px solid var(--border); border-radius:4px;
    padding:80px 28px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; text-align:center;
  }
  .ph-icon { font-size:4rem; opacity:.12; }
  .ph-title { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:3px; color:var(--muted); }
  .ph-sub { font-size:.8rem; color:var(--muted); opacity:.5; max-width:280px; line-height:1.7; }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:28px; right:28px; z-index:200;
    background:var(--surface2); border:1px solid var(--border); border-radius:4px;
    padding:14px 22px; font-family:'JetBrains Mono',monospace; font-size:.75rem; letter-spacing:1px;
    color:var(--success); transform:translateY(80px); opacity:0; transition:all .3s ease; pointer-events:none;
  }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.err  { color:#ff4757; border-color:#ff4757; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .fi { animation:fadeUp .22s ease forwards; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .layout { grid-template-columns:1fr; }
    .sidebar { position:static; max-height:none; }
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .wk-grid { grid-template-columns:repeat(6,1fr); }
  }
  @media (max-width: 500px) {
    .stats-row { grid-template-columns:1fr 1fr; }
    .wk-grid { grid-template-columns:repeat(4,1fr); }
    .chart-wrap { height:260px; }
    header { flex-direction:column; align-items:flex-start; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <h1>Guray's Hypertrophy Max</h1>
      <p>Progressive Overload Tracker — 12 Hafta</p>
    </div>
    <div class="header-right">
      <span class="badge badge-push">İtiş</span>
      <span class="badge badge-pull">Çekiş</span>
      <span class="badge badge-legs">Bacak</span>
      <input type="file" id="fileInput" accept=".xlsx">
      <button class="import-btn" onclick="document.getElementById('fileInput').click()">⬆ Excel Yükle</button>
      <button class="analysis-btn" id="analysisBtn" onclick="openAnalysis()">⚡ Analiz</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-hdr">Hareketler</div>
      <div id="list"></div>
    </aside>
    <main class="content" id="main">
      <div class="placeholder">
        <div class="ph-icon">📈</div>
        <div class="ph-title">Hareket Seç</div>
        <div class="ph-sub">Sol panelden bir hareket seçtiğinde haftalık ağırlık grafiği görünecek.</div>
      </div>
    </main>
  </div>
</div>

<!-- ANALİZ MODAL -->
<div class="analysis-overlay" id="analysisOverlay">
  <div class="analysis-panel">
    <button class="analysis-close" onclick="closeAnalysis()">✕</button>
    <div class="analysis-header">
      <h2>Performans Analizi</h2>
      <p id="analysisMeta">Verilerinden otomatik oluşturuldu</p>
    </div>
    <div id="analysisContent">
      <div class="analysis-loading">
        <div class="spinner"></div>
        <div class="loading-text">Veriler analiz ediliyor…</div>
      </div>
    </div>
  </div>
</div>

<!-- WEIGHT INPUT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Ağırlık Gir</div>
    <div class="modal-sub"   id="modalSub"></div>
    <input type="number" id="modalInput" min="0" step="0.5" placeholder="kg">
    <div class="modal-actions">
      <button class="btn-confirm" id="modalConfirm">Kaydet</button>
      <button class="btn-cancel"  id="modalCancel">İptal</button>
      <button class="btn-clear"   id="modalClear">Sil</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// ── PERSISTENCE ───────────────────────────────────────────────────────────
(function load() {
  try {
    const p = JSON.parse(localStorage.getItem('ghm3') || 'null');
    if (!p) return;
    Object.keys(p).forEach(d => Object.keys(p[d]).forEach(e => {
      if (RAW[d] && RAW[d][e]) RAW[d][e] = p[d][e];
    }));
  } catch(e) {}
})();

function save() {
  try { localStorage.setItem('ghm3', JSON.stringify(RAW)); } catch(e) {}
}

// ── STATE ─────────────────────────────────────────────────────────────────
let AK=null, AT=null, AN=null, ADAYS=[], chartInst=null;

// ── SIDEBAR ───────────────────────────────────────────────────────────────
function buildList() {
  const el = document.getElementById('list');
  el.innerHTML = '';
  Object.entries(GROUPS).forEach(([type, g]) => {
    const blk = document.createElement('div');
    blk.className = 'grp';
    blk.innerHTML = `<div class="grp-lbl ${type}">${g.label}</div>`;
    g.entries.forEach(e => {
      const on = e.days.some(d => RAW[d][e.name] && RAW[d][e.name].some(v => v !== null));
      const tags = e.days.length > 1
        ? e.days.map(d => `<span class="day-tag">${ABBR[d]}</span>`).join('') : '';
      const btn = document.createElement('button');
      btn.className = `ex-btn${AK===e.key ? ' active '+type : ''}`;
      btn.innerHTML = `<span class="ex-name">${e.name}</span>${tags}<span class="dot ${on?'dot-on':'dot-off'}"></span>`;
      btn.onclick = () => { AK=e.key; AT=type; AN=e.name; ADAYS=e.days; render(); };
      blk.appendChild(btn);
    });
    el.appendChild(blk);
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const allSeries = ADAYS.map(d => ({ day:d, weights:RAW[d][AN] }));

        <div class="stat-lbl">Toplam Artış</div>

      </div>
      <div class="stat accent-${AT}">
        <div class="stat-lbl">Hafta Kaydı</div>
        <div class="stat-val ${AT}">${s.count}<span> / 12</span></div>
        <div class="stat-sub">Tamamlanan</div>
      </div>
    </div>

    <div class="chart-card fi">
      <div class="chart-title-row">
        <div>
          <div class="chart-title">${AN}</div>
          <div class="chart-sub" style="color:${c}">
            ${TYPE_LABEL[AT]} — Ağırlık (kg) / Hafta · ${multi ? ADAYS.map(d=>ABBR[d]).join(' + ') : ABBR[ADAYS[0]]}

        </div>

      </div>
      ${any
        ? `<div class="chart-wrap"><canvas id="cv"></canvas></div>`
        : `<div class="empty-state">
             <div style="font-size:3rem;opacity:.2">📊</div>
             <div class="empty-text">Henüz veri yok<br>Aşağıdan ağırlıkları gir</div>
           </div>`
      }

    <div class="tbl-card fi">
      <div class="tbl-hdr">Haftalık Ağırlıklar — Hücreye tıklayarak düzenle</div>

}

// ── GRIDS ─────────────────────────────────────────────────────────────────
function buildGrids(allSeries) {
  const container = document.getElementById('allGrids');
  const multi = allSeries.length > 1;
  allSeries.forEach((series, si) => {
    const { day, weights } = series;
    const dc = DAY_COLORS[si % DAY_COLORS.length];
    if (multi) {
      const band = document.createElement('div');
      band.className = 'day-band';
      band.style.cssText = `color:${dc.line};background:rgba(${dc.r},${dc.g},${dc.b},.06);`;
      band.textContent = day;
      container.appendChild(band);
    }
    const grid = document.createElement('div');
    grid.className = 'wk-grid';
    weights.forEach((v, i) => {
      const prev = i > 0 ? weights[i-1] : null;
      let dt='', dcc='';
      if (v !== null && prev !== null) {
        const d = v - prev;
        if (d > 0)      { dt=`+${d}`; dcc='du'; }
        else if (d < 0) { dt=`${d}`;  dcc='dd'; }
        else            { dt='±0';    dcc='ds'; }
      }
      const cell = document.createElement('div');
      cell.className = 'wk-cell';
      cell.innerHTML = `
        <div class="wk-num">H${i+1}</div>
        <div class="wk-val ${v!==null?AT:'empty'}">${v!==null?v:'·'}</div>
        <div class="wk-delta ${dcc}">${dt||' '}</div>
        <span class="wk-edit">✏</span>
      `;
      cell.onclick = () => openModal(day, i, v);
      grid.appendChild(cell);
    });
    container.appendChild(grid);
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────
let _mDay=null, _mIdx=null;

function openModal(day, idx, current) {
  _mDay = day; _mIdx = idx;
  document.getElementById('modalTitle').textContent = AN;
  document.getElementById('modalSub').textContent   = `${day}  ·  HAFTA ${idx+1}`;
  const inp = document.getElementById('modalInput');
  inp.value = current !== null ? current : '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => inp.focus(), 50);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  _mDay = null; _mIdx = null;
}

document.getElementById('modalConfirm').onclick = () => {
  const v = parseFloat(document.getElementById('modalInput').value);
  if (!isNaN(v) && v >= 0) { RAW[_mDay][AN][_mIdx] = v; save(); closeModal(); render(); }
};
document.getElementById('modalClear').onclick = () => {
  RAW[_mDay][AN][_mIdx] = null; save(); closeModal(); render();
};
document.getElementById('modalCancel').onclick  = closeModal;
document.getElementById('modalOverlay').onclick  = e => { if (e.target.id==='modalOverlay') closeModal(); };
document.getElementById('modalInput').onkeydown  = e => {
  if (e.key === 'Enter')  document.getElementById('modalConfirm').click();
  if (e.key === 'Escape') closeModal();
};

// ── CHART ─────────────────────────────────────────────────────────────────
function buildChart(allSeries) {
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const canvas = document.getElementById('cv');
  if (!canvas) return;
  const ctx   = canvas.getContext('2d');
  const multi = allSeries.length > 1;
  const labels= Array.from({length:12}, (_,i) => `H${i+1}`);

  const datasets = allSeries.map((series, si) => {
    const dc   = DAY_COLORS[si % DAY_COLORS.length];
    const w    = series.weights;
    const grad = ctx.createLinearGradient(0,0,0,340);
    grad.addColorStop(0, `rgba(${dc.r},${dc.g},${dc.b},${multi?0.1:0.22})`);
    grad.addColorStop(1, `rgba(${dc.r},${dc.g},${dc.b},0)`);
    return {
      label: ABBR[series.day], data: w,
      borderColor: dc.line, backgroundColor: grad, borderWidth: 2.5,
      pointBackgroundColor: w.map(v => v!==null ? dc.line : 'transparent'),
      pointBorderColor:     w.map(v => v!==null ? dc.line : 'transparent'),
      pointRadius:          w.map(v => v!==null ? 6 : 0),
      pointHoverRadius: 10, tension: 0.35, fill: !multi, spanGaps: false,
      _color: dc.line,
    };
  });

  chartInst = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration:450, easing:'easeInOutQuart' },
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: {
          display: multi,
          labels: { color:'#4a6080', font:{family:'JetBrains Mono',size:10}, boxWidth:12, padding:16 }
        },
        tooltip: {
          backgroundColor:'#0f1623', borderColor:'#1e2d45', borderWidth:1,
          titleColor:'#4a6080',
          titleFont: { family:'JetBrains Mono', size:10 },
          bodyFont:  { family:'Bebas Neue', size:20 },
          padding: 14,
          callbacks: {
            title: items => `HAFTA ${items[0].dataIndex+1}`,
            label: item  => item.raw !== null
              ? `  ${item.dataset.label}  ${item.raw} kg`
              : `  ${item.dataset.label}  —`,
          }
        }
      },
      scales: {
        x: {
          grid:   { color:'rgba(30,45,69,0.8)' },
          ticks:  { color:'#4a6080', font:{family:'JetBrains Mono',size:10} },
          border: { color:'#1e2d45' }
        },
        y: {
          grid:   { color:'rgba(30,45,69,0.8)' },
          ticks:  { color:'#4a6080', font:{family:'JetBrains Mono',size:10}, callback:v=>`${v} kg`, stepSize:5 },
          border: { color:'#1e2d45' }
        }
      }
    },
    plugins: [{
      id: 'datalabels',
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        chart.data.datasets.forEach((ds, di) => {
          const color  = ds._color;
          const offset = multi ? (di===0 ? -14 : 14) : 0;
          chart.getDatasetMeta(di).data.forEach((pt, idx) => {
            const val = ds.data[idx];
            if (val === null) return;
            ctx.save();
            ctx.font = '600 10px JetBrains Mono,monospace';
            ctx.fillStyle = color;
            ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
            ctx.fillText(`${val}`, pt.x + offset, pt.y - 10);
            ctx.restore();
          });
        });
      }
    }]
  });
}

// ── STATS ─────────────────────────────────────────────────────────────────
function calcStats(allSeries) {
  const filled = allSeries.flatMap(s => s.weights).filter(v => v !== null);
  if (!filled.length) return { max:'—', first:'—', gain:'—', count:0 };
  const max = Math.max(...filled);
  let first=null, last=null;
  for (const s of allSeries) for (const v of s.weights)               { if (v!==null && first===null) { first=v; break; } }
  for (const s of allSeries) for (const v of [...s.weights].reverse()) { if (v!==null && last===null)  { last=v;  break; } }
  const d = last - first;
  return { max, first, gain: d>0?`+${d}`:d<0?`${d}`:'±0', count: filled.length };
}

// ── TOAST ─────────────────────────────────────────────────────────────────

  setTimeout(() => { t.className = 'toast'; }, 3200);
}

const ALIASES = {
  // İTİŞ — kullanıcı tanımlı anahtar kelimeler
  "chest press":       "Plate Loaded Chest Press",
  "incline press":     "Smith Machine Low Incline Press",
  "chest fly":         "Chest Fly Machine",
  "shoulder press":    "Shoulder Press Machine",
  "lateral raise":     "Lateral Raise",
  "triceps pushdown":  "Triceps Pushdown",
  "triceps extension": "Overhead Rope Extension",
  // Diğer hareketler
  "lat pulldown":          "Lat Pulldown",
  "wide grip row":         "Plate Loaded Wide Grip Row",
  "cable row":             "Cable Row",
  "romanian deadlift":     "Romanian Deadlift",
  "rear delt":             "Cable Rear Delt Fly",
  "incline dumbbell curl": "Incline Dumbbell Curl",
  "cable curl":            "Cable Curl",
  "hammer curl":           "Hammer Curl",
  "reverse barbell curl":  "Reverse Barbell Curl",
  "reverse curl":          "Reverse Barbell Curl",
  "leg press":             "Leg Press",
  "squat":                 "Smith Machine Squat",
  "leg extension":         "Leg Extension",
  "leg curl":              "Seated Leg Curl",
};

function resolveExerciseName(rawName, dayKey) {
  if (!rawName || typeof rawName !== 'string') return null;
  const cleaned = rawName.trim();
  if (RAW[dayKey] && RAW[dayKey][cleaned] !== undefined) return cleaned;
  const lower = cleaned.toLowerCase();
  for (const [keyword, canonical] of Object.entries(ALIASES)) {
    if (lower.includes(keyword)) {
      if (RAW[dayKey] && RAW[dayKey][canonical] !== undefined) return canonical;
      for (const d of Object.keys(RAW)) { if (RAW[d][canonical] !== undefined) return canonical; }
    }
  }
  return null;
}

const DAY_VARIANTS = {
  "pazartesi":"PAZARTESİ","monday":"PAZARTESİ",
  "sali":"SALI","salı":"SALI","tuesday":"SALI",
  "carsamba":"ÇARŞAMBA","çarşamba":"ÇARŞAMBA","wednesday":"ÇARŞAMBA",
  "cuma":"CUMA","friday":"CUMA",
  "cumartesi":"CUMARTESİ","saturday":"CUMARTESİ",
};
function resolveDayKey(sheetName) {
  const upper = sheetName.trim().toUpperCase();
  if (RAW[upper]) return upper;
  const lower = sheetName.trim().toLowerCase()
    .replace(/[İı]/g,'i').replace(/[Şş]/g,'s').replace(/[Ğğ]/g,'g')
    .replace(/[Üü]/g,'u').replace(/[Öö]/g,'o').replace(/[Çç]/g,'c');
  return DAY_VARIANTS[lower] || null;
}

// ── EXCEL OKUYUCU ─────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  if (file.size > 10 * 1024 * 1024) {
    showToast('Dosya çok büyük — maks 10 MB', true);
    e.target.value = ''; return;
  }

  const reader = new FileReader();
  reader.onerror = () => showToast('❌ Dosya okunamadı — tekrar dene', true);

  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, {type:'binary'});

      const recognizedSheets = wb.SheetNames.filter(s => resolveDayKey(s));
      if (recognizedSheets.length === 0) {
        showToast('❌ Tanınan sayfa bulunamadı.\nSayfa adları: PAZARTESİ · SALI · ÇARŞAMBA · CUMA · CUMARTESİ olmalı', true);
        e.target.value = ''; return;
      }

      let imported = 0, skipped = 0, skippedNames = [];

      wb.SheetNames.forEach(sheetName => {
        const dayKey = resolveDayKey(sheetName);
        if (!dayKey) return;

        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {header:1, defval:null});

        // Veri başlangıcını bul — başlık satırlarını atla
        let dataStartRow = 0;
        for (let r = 0; r < Math.min(6, rows.length); r++) {
          const firstCell = rows[r] && rows[r][0];
          if (!firstCell) { dataStartRow = r + 1; continue; }
          const lc = String(firstCell).toLowerCase();
          if (lc.includes('egzersiz') || lc.includes('exercise') ||
              lc.includes('hafta')    || lc.includes('week')     ||
              lc.includes('program')  || lc.includes('gün')      ||
              lc.includes('hypertrophy') || lc.includes('max')) {
            dataStartRow = r + 1;
          } else {
            dataStartRow = r; break;
          }
        }

        for (let r = dataStartRow; r < rows.length; r++) {
          const row = rows[r];
          if (!row || !row[0]) continue;

          const canonical = resolveExerciseName(row[0], dayKey);
          if (!canonical) {
            skipped++;
            skippedNames.push(`"${String(row[0]).substring(0,30)}" (${sheetName})`);
            continue;
          }

          const weights = [];
          let cols = 0;
          for (let c = 1; c < row.length && cols < 12; c++) {
            const v = row[c];
            if (v !== null && v !== '' && !isNaN(Number(v))) {
              weights.push(Number(v)); cols++;
            } else if (v === null || v === '') {
              weights.push(null); cols++;
            }
          }
          while (weights.length < 12) weights.push(null);
          RAW[dayKey][canonical] = weights.slice(0, 12);
          imported++;
        }
      });

      if (imported === 0) {
        const hint = skippedNames.length
          ? `Tanınamayan satırlar: ${skippedNames.slice(0,3).join(', ')}${skippedNames.length>3?' …':''}`
          : 'Hiç veri satırı bulunamadı.';
        showToast(`❌ Veri aktarılamadı. ${hint}\nİlk sütun egzersiz adı, sonraki sütunlar haftalık ağırlık olmalı.`, true);
        e.target.value = ''; return;
      }

      save(); buildList();
      if (AK) render();
      showToast(
        skipped > 0
          ? `✓ ${imported} hareket aktarıldı  ·  ${skipped} satır tanınamadı`
          : `✓ ${imported} hareket aktarıldı`,
        skipped > 0
      );

    } catch(err) {
      const friendly = err.message && err.message.toLowerCase().includes('zip')
        ? '❌ Dosya bozuk veya .xlsx formatında değil'
        : `❌ Okunamadı: ${err.message}\nDosyanın .xlsx olarak kaydedildiğinden emin ol.`;
      showToast(friendly, true);
    }
    e.target.value = '';
  };
  reader.readAsBinaryString(file);
});

// ── ANALİZ MOTORu (Local — API gerekmez) ─────────────────────────────────

function openAnalysis() {
  document.getElementById('analysisOverlay').classList.add('open');
  document.getElementById('analysisContent').innerHTML = `
    <div class="analysis-loading">
      <div class="spinner"></div>
      <div class="loading-text">Veriler analiz ediliyor…</div>
    </div>`;
  setTimeout(runLocalAnalysis, 120);
}

function closeAnalysis() {
  document.getElementById('analysisOverlay').classList.remove('open');
}

document.getElementById('analysisOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeAnalysis();
});

// ── YARDIMCI FONKSİYONLAR ────────────────────────────────────────────────

function getExerciseStats() {
  const result = [];
  Object.entries(GROUPS).forEach(([type, g]) => {
    g.entries.forEach(e => {
      const allW = e.days.flatMap(d => (RAW[d][e.name] || []));
      const filled = allW.filter(v => v !== null);
      if (filled.length === 0) { result.push({ name:e.name, type, hasData:false, days:e.days }); return; }

      const first = filled[0];
      const last  = filled[filled.length - 1];
      const max   = Math.max(...filled);
      const min   = Math.min(...filled);
      const weeks = filled.length;
      const gainAbs = last - first;
      const gainPct = first > 0 ? Math.round((gainAbs / first) * 100) : 0;

      // Trend: son 3 hafta eğimi
      const recent = filled.slice(-3);
      const trend = recent.length >= 2
        ? (recent[recent.length-1] - recent[0]) / (recent.length - 1)
        : 0;

      // Tutarlılık: kaç haftada art arda artış var
      let streak = 0, maxStreak = 0, cur = 0;
      for (let i = 1; i < filled.length; i++) {
        if (filled[i] > filled[i-1]) { cur++; maxStreak = Math.max(maxStreak, cur); }
        else { cur = 0; }
      }
      // Plateau: son 3 hafta <%3 değişim
      const recentRange = recent.length >= 2 ? Math.max(...recent) - Math.min(...recent) : 0;
      const isPlateau   = weeks >= 3 && recentRange / (recent[0] || 1) < 0.03;
      // Regresyon: son haftada düşüş
      const isRegressing = weeks >= 2 && filled[filled.length-1] < filled[filled.length-2];

      result.push({ name:e.name, type, hasData:true, days:e.days,
        first, last, max, min, weeks, gainAbs, gainPct, trend, maxStreak,
        isPlateau, isRegressing, filled });
    });
  });
  return result;
}

function groupAverages(stats) {
  const g = { push:[], pull:[], legs:[] };
  stats.filter(s => s.hasData).forEach(s => g[s.type].push(s.gainPct));
  return Object.entries(g).map(([type, arr]) => ({
    type,
    label: { push:'İtiş', pull:'Çekiş', legs:'Bacak' }[type],
    color: { push:'#ff6b35', pull:'#00d4ff', legs:'#a855f7' }[type],
    avg:   arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : null,
    count: arr.length,
    total: Object.values(GROUPS).find((_,i)=>Object.keys(GROUPS)[i]===type)?.entries.length || 0
  }));
}

// ── ANA ANALİZ FONKSİYONU ────────────────────────────────────────────────

function runLocalAnalysis() {
  const stats      = getExerciseStats();
  const withData   = stats.filter(s => s.hasData);
  const noData     = stats.filter(s => !s.hasData);
  const gAvg       = groupAverages(stats);
  const totalEx    = stats.length;

  if (withData.length === 0) {
    document.getElementById('analysisContent').innerHTML = `
      <div class="analysis-body">
        <div class="summary-box" style="text-align:center;padding:40px;">
          <div style="font-size:3rem;margin-bottom:16px;opacity:.3;">📊</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--muted);margin-bottom:10px;">Henüz veri yok</div>
          <div style="font-size:.83rem;color:var(--muted);line-height:1.7;">Ağırlıklarını kaydetmeye başladıktan sonra analiz buraya yansıyacak.</div>
        </div>
      </div>`;
    document.getElementById('analysisMeta').textContent = 'Veri girilmemiş';
    return;
  }

  // ── SKORLAR ──────────────────────────────────────────────────────────
  const sorted       = [...withData].sort((a,b) => b.gainPct - a.gainPct);
  const plateaus     = withData.filter(s => s.isPlateau);
  const regressing   = withData.filter(s => s.isRegressing && !s.isPlateau);
  const strongGroup  = [...gAvg].filter(g => g.count > 0).sort((a,b) => (b.avg||0) - (a.avg||0))[0];
  const weakGroup    = [...gAvg].filter(g => g.count > 0).sort((a,b) => (a.avg||0) - (b.avg||0))[0];
  const coverage     = Math.round((withData.length / totalEx) * 100);
  const avgGain      = Math.round(withData.reduce((s,e)=>s+e.gainPct,0) / withData.length);
  const maxWeeks     = Math.max(...withData.map(s => s.weeks));
  const maxGainEx    = sorted[0];
  const topStreakEx  = [...withData].sort((a,b) => b.maxStreak - a.maxStreak)[0];

  // ── GENEL DEĞERLENDİRME METNİ ────────────────────────────────────────
  let genelYorum = '';
  if (avgGain >= 20)      genelYorum = `Genel ilerleme mükemmel — ortalama <strong>%${avgGain}</strong> artış, bu yüksek bir rakam. Progressive overload tam çalışıyor.`;
  else if (avgGain >= 10) genelYorum = `Solid bir ilerleme var — ortalama <strong>%${avgGain}</strong> artış. Birkaç harekette ivme daha da artırılabilir.`;
  else if (avgGain >= 3)  genelYorum = `Ilımlı bir ilerleme görünüyor — ortalama <strong>%${avgGain}</strong>. Ağırlık artışlarını biraz daha agresif tutmayı düşünebilirsin.`;
  else                    genelYorum = `İlerleme henüz düşük (%${avgGain}). Bu normal — ya program yeni başladı, ya ağırlıklar çok muhafazakâr seçiliyor, ya da veri girişi eksik.`;

  if (plateaus.length > 0) genelYorum += ` <strong>${plateaus.length}</strong> harekette plateau tespit edildi.`;
  if (coverage < 60)        genelYorum += ` Hareketlerin yalnızca <strong>%${coverage}</strong>'i kayıtlı — daha fazla veri gir.`;

  // ── ÖNERİLER ─────────────────────────────────────────────────────────
  const recs = [];

  // 1. Plateau hareketler
  plateaus.forEach(p => {
    recs.push({
      icon: '📊',
      prio: 'yüksek',
      prioBg: 'rgba(255,71,87,.12)', prioColor: '#ff4757',
      cat: 'Plateau',
      baslik: `${p.name} — Plateau'ya girdi`,
      aciklama: `Son ${p.weeks} haftadaki aralık: ${p.min}–${p.max} kg (<%3 değişim). `
        + (p.last >= 60
          ? `Ağırlığı 2.5 kg artırmayı dene; başaramazsan set sayısını 1 artır.`
          : `2.5 kg artış dene ya da mevcut ağırlıkta 1 set daha ekle.`)
    });
  });

  // 2. Kas grubu dengesizliği
  if (strongGroup && weakGroup && strongGroup.type !== weakGroup.type
      && strongGroup.avg !== null && weakGroup.avg !== null
      && (strongGroup.avg - weakGroup.avg) >= 8) {
    recs.push({
      icon: '⚖️',
      prio: 'orta',
      prioBg: 'rgba(255,209,102,.12)', prioColor: '#ffd166',
      cat: 'Denge',
      baslik: `${weakGroup.label} grubu ${strongGroup.label}'ın gerisinde`,
      aciklama: `${strongGroup.label}'da ortalama %${strongGroup.avg} artış var, ${weakGroup.label}'da ise %${weakGroup.avg||0}. `
        + `${weakGroup.label} antrenmanlarında daha yüksek başlangıç ağırlığı seç veya ek set ekle.`
    });
  }

  // 3. Regresyon
  regressing.forEach(r => {
    recs.push({
      icon: '📉',
      prio: 'orta',
      prioBg: 'rgba(255,71,87,.08)', prioColor: '#ff6b6b',
      cat: 'Regresyon',
      baslik: `${r.name} son haftada geriledi`,
      aciklama: `${r.filled[r.filled.length-2]} kg'dan ${r.filled[r.filled.length-1]} kg'a düştü. `
        + `Aşırı yorgunluk, uyku eksikliği veya yetersiz beslenme olabilir. Bu harekete önümüzdeki 2 haftada odaklan.`
    });
  });

  // 4. En iyi momentum
  if (maxGainEx && maxGainEx.gainPct >= 10) {
    recs.push({
      icon: '🚀',
      prio: 'düşük',
      prioBg: 'rgba(0,255,157,.08)', prioColor: '#00ff9d',
      cat: 'Güçlü Alan',
      baslik: `${maxGainEx.name} hareketi çok iyi ilerliyor`,
      aciklama: `${maxGainEx.weeks} haftada ${maxGainEx.first} → ${maxGainEx.last} kg (%${maxGainEx.gainPct} artış). `
        + `Bu momentum'u koru — her antrenmanda en az 0 veya +2.5 kg hedefle.`
    });
  }

  // 5. Eksik veri
  if (noData.length > 0) {
    recs.push({
      icon: '📝',
      prio: 'orta',
      prioBg: 'rgba(168,85,247,.1)', prioColor: '#a855f7',
      cat: 'Veri Eksik',
      baslik: `${noData.length} hareket için hiç veri girilmemiş`,
      aciklama: `${noData.slice(0,4).map(n=>n.name).join(', ')}${noData.length>4?` ve ${noData.length-4} diğeri`:''} kayıtlı değil. `
        + `Her antrenman bittikten sonra 2 dakika ayırıp tüm ağırlıkları gir — trend ancak böyle görünür.`
    });
  }

  // 6. Süreklilik (düşük hafta sayısı)
  const lowWeekEx = withData.filter(s => s.weeks <= 2);
  if (lowWeekEx.length >= 3) {
    recs.push({
      icon: '📅',
      prio: 'düşük',
      prioBg: 'rgba(0,212,255,.08)', prioColor: '#00d4ff',
      cat: 'Süreklilik',
      baslik: `${lowWeekEx.length} harekette yalnızca 1–2 hafta veri var`,
      aciklama: `Anlamlı trend görmek için en az 4 hafta veriye ihtiyaç var. Kaydı düzenli tutmaya devam et.`
    });
  }

  if (recs.length === 0) {
    recs.push({
      icon: '🏆',
      prio: 'düşük',
      prioBg: 'rgba(0,255,157,.08)', prioColor: '#00ff9d',
      cat: 'Mükemmel',
      baslik: 'Tüm hareketlerde düzenli artış var',
      aciklama: 'Her hafta ağırlık artışı kaydediyorsun ve plateau yok. Bu ritmi koru — 12. haftada maksimum test yap.'
    });
  }

  // ── MOTİVASYON ───────────────────────────────────────────────────────
  let motivasyon = '';
  if (avgGain >= 15)      motivasyon = `${maxWeeks}. haftadasın ve ${maxGainEx?.name || 'hareketlerin'} ${maxGainEx?.gainPct || 0}% büyüdü — rakamlar yalan söylemez. 🔥`;
  else if (plateaus.length > 0) motivasyon = `Plateau geçici — kaslar adapte oluyor. Küçük bir değişiklik büyük farklar yaratır. 💡`;
  else if (avgGain >= 5)  motivasyon = `Her hafta biraz daha güçlüsün. Compound etki zamanla devasa bir fark yaratır. 📈`;
  else                    motivasyon = `Başlangıç her zaman en zor aşama. Veriyi kaydet, program seni oraya taşır. 💪`;

  // ── RENDER ───────────────────────────────────────────────────────────
  const prioLabels = { yüksek:'🔴 Yüksek', orta:'🟡 Orta', düşük:'🔵 Düşük' };

  const html = `<div class="analysis-body">

    <!-- ÖZET KUTU -->
    <div class="summary-box">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="font-size:1.1rem;">📊</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:#a78bfa;">Genel Değerlendirme</span>
      </div>
      <p style="line-height:1.85;font-size:.87rem;">${genelYorum}</p>
    </div>

    <!-- KAS GRUBU SKORLARI -->
    <div class="asec">
      <div class="asec-title">💪 Kas Grubu Karşılaştırması</div>
      <div class="asec-body">
        <div class="strength-grid">
          ${gAvg.map(g => {
            const maxAvg = Math.max(...gAvg.map(x=>x.avg||0), 1);
            const barW   = g.avg !== null ? Math.max(4, Math.round((g.avg/maxAvg)*100)) : 4;
            const badge  = g.avg === null ? 'Veri yok' : g.avg >= 15 ? 'Güçlü 🔥' : g.avg >= 5 ? 'Gelişiyor' : 'Zayıf';
            return `<div class="sc">
              <div class="sc-lbl">${badge}</div>
              <div class="sc-name" style="color:${g.color}">${g.label}</div>
              <div class="sc-bar-bg"><div class="sc-bar" style="width:${barW}%;background:${g.color};transition:width 1s ease;"></div></div>
              <div class="sc-val">${g.count > 0 ? `Ort. %${g.avg ?? 0} artış · ${g.count}/${g.count} hareket` : 'Henüz kayıt yok'}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- HAREKET BAZLI İLERLEME -->
    ${sorted.length > 0 ? `<div class="asec">
      <div class="asec-title">📈 Hareket Bazlı İlerleme</div>
      <div class="asec-body"><div class="prog-list">
        ${sorted.slice(0, 8).map(s => {
          const maxGain = sorted[0].gainPct || 1;
          const barW    = Math.max(4, Math.round((s.gainPct / maxGain) * 100));
          const barCol  = s.isPlateau ? '#ff4757' : s.isRegressing ? '#ff6b35' : { push:'#ff6b35', pull:'#00d4ff', legs:'#a855f7' }[s.type];
          const tag     = s.isPlateau ? ' 📊plateau' : s.isRegressing ? ' 📉gerileme' : '';
          return `<div class="prog-item">
            <div class="prog-name" style="font-size:.78rem;">${s.name}<span style="font-size:.6rem;color:var(--muted);margin-left:4px;">${tag}</span></div>
            <div class="prog-bar-bg"><div class="prog-bar" style="width:${barW}%;background:${barCol};transition:width 1s ease .1s;"></div></div>
            <div class="prog-pct" style="color:${s.gainPct>=0?barCol:'#ff4757'}">${s.gainPct>=0?'+':''}${s.gainPct}%</div>
          </div>`;
        }).join('')}
      </div></div>
    </div>` : ''}

    <!-- PLATEAU / GELİŞİME AÇIK -->
    ${plateaus.length > 0 ? `<div style="background:rgba(255,71,87,.07);border:1px solid rgba(255,71,87,.25);border-radius:6px;padding:16px 20px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;color:#ff4757;margin-bottom:10px;">⚠️ PLATEAU TESPİTİ — ${plateaus.length} hareket</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${plateaus.map(p => `<div style="font-size:.82rem;line-height:1.6;">
          <strong>${p.name}</strong>: Son ${p.weeks} hafta ${p.min}–${p.max} kg arasında sabit
          <span style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);margin-left:6px;">→ +2.5 kg veya +1 set dene</span>
        </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- KİŞİSEL ÖNERİLER -->
    <div class="asec">
      <div class="asec-title">✨ Kişisel Öneriler</div>
      <div class="asec-body"><div class="rec-list">
        ${recs.slice(0,5).map(r => `<div class="rec-item">
          <div class="rec-icon">${r.icon}</div>
          <div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
              <div class="rec-title">${r.baslik}</div>
              <span class="rec-tag" style="background:${r.prioBg};color:${r.prioColor}">${prioLabels[r.prio]}</span>
              <span class="rec-tag" style="background:rgba(255,255,255,.04);color:var(--muted)">${r.cat}</span>
            </div>
            <div class="rec-desc">${r.aciklama}</div>
          </div>
        </div>`).join('')}
      </div></div>
    </div>

    <!-- MOTİVASYON -->
    <div style="text-align:center;padding:22px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);">
      <div style="font-size:1.4rem;margin-bottom:10px;">🔥</div>
      <div style="font-size:.9rem;color:var(--text);font-style:italic;line-height:1.75;">"${motivasyon}"</div>
    </div>

  </div>`;

  document.getElementById('analysisContent').innerHTML = html;
  document.getElementById('analysisMeta').textContent =
    `${withData.length}/${totalEx} hareket kaydedilmiş · ${maxWeeks} hafta · ort. %${avgGain} artış`;
}


// ── INIT ──────────────────────────────────────────────────────────────────
buildList();
</script>
